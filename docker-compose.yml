services:
  web:
    container_name: porto
    # image: dickyjoelsaputra/porto:latest
    image: .
    expose:
      - "8080"
    volumes:
      - ./index.html:/app/index.html
      - ./static:/app/static
    networks:
      - shared_network
    restart: unless-stopped

networks:
  shared_network:
    external: true
